<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – Server Down</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --ink: #0d0d0d;
      --red: #e8281a;
      --red-soft: #ffecea;
      --gray: #8a8a8a;
      --border: #e0e0e0;
    }

    body {
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.45;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 48px 32px;
      max-width: 520px;
      width: 100%;
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SVG Illustration ── */
    .illustration {
      display: flex;
      justify-content: center;
      margin-bottom: 36px;
    }

    .server-svg {
      width: 160px;
      height: auto;
      filter: drop-shadow(0 8px 24px rgba(232,40,26,.15));
      animation: float 3.6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* Blink on the warning light */
    .blink { animation: blink 1.1s step-start infinite; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Signal arcs */
    .arc { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arc:nth-child(1) { animation-delay: 0s; }
    .arc:nth-child(2) { animation-delay: 0.3s; }
    .arc:nth-child(3) { animation-delay: 0.6s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 1; }
    }

    /* ── Text ── */
    .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      background: var(--red-soft);
      display: inline-block;
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(52px, 12vw, 80px);
      font-weight: 800;
      color: var(--ink);
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    h1 span { color: var(--red); }

    .subtitle {
      font-size: 15px;
      color: var(--gray);
      line-height: 1.6;
      max-width: 360px;
      margin: 0 auto 36px;
    }

    /* ── Buttons ── */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-primary {
      background: var(--ink);
      color: #fff;
      box-shadow: 0 4px 16px rgba(13,13,13,.18);
    }
    .btn-primary:hover { background: #222; box-shadow: 0 8px 24px rgba(13,13,13,.25); }

    .btn-secondary {
      background: var(--white);
      color: var(--ink);
      border: 1.5px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .btn-secondary:hover { border-color: #bbb; box-shadow: 0 4px 16px rgba(0,0,0,.1); }

    /* ── Status bar ── */
    .status-bar {
      margin-top: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
      color: var(--gray);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1.1s step-start infinite;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- SVG Illustration: Server + disconnected signal -->
    <div class="illustration">
      <svg class="server-svg" viewBox="0 0 160 180" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- Signal arcs (broken / fading) -->
        <g transform="translate(80, 28)">
          <path class="arc" d="M-28,-20 A34,34 0 0,1 28,-20" stroke="#e8281a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <path class="arc" d="M-18,-10 A22,22 0 0,1 18,-10" stroke="#e8281a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <path class="arc" d="M-8,0 A10,10 0 0,1 8,0"   stroke="#e8281a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <!-- X mark over signal -->
          <line x1="-6" y1="-28" x2="6" y2="-16" stroke="#e8281a" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="6"  y1="-28" x2="-6" y2="-16" stroke="#e8281a" stroke-width="2.5" stroke-linecap="round"/>
        </g>

        <!-- Server rack body -->
        <!-- Rack 1 -->
        <rect x="20" y="52" width="120" height="30" rx="6" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="1.5"/>
        <rect x="30" y="62" width="40" height="10" rx="3" fill="#e0e0e0"/>
        <circle cx="110" cy="67" r="4" fill="#e8281a" class="blink"/>
        <circle cx="124" cy="67" r="4" fill="#d0d0d0"/>
        <rect x="78" y="64" width="18" height="6" rx="2" fill="#d0d0d0"/>

        <!-- Rack 2 -->
        <rect x="20" y="90" width="120" height="30" rx="6" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="1.5"/>
        <rect x="30" y="100" width="50" height="10" rx="3" fill="#e8281a" opacity=".18"/>
        <circle cx="110" cy="105" r="4" fill="#d0d0d0"/>
        <circle cx="124" cy="105" r="4" fill="#e8281a" class="blink"/>
        <rect x="78" y="102" width="18" height="6" rx="2" fill="#d0d0d0"/>

        <!-- Rack 3 -->
        <rect x="20" y="128" width="120" height="30" rx="6" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="1.5"/>
        <rect x="30" y="138" width="30" height="10" rx="3" fill="#e0e0e0"/>
        <circle cx="110" cy="143" r="4" fill="#d0d0d0"/>
        <circle cx="124" cy="143" r="4" fill="#d0d0d0"/>
        <rect x="78" y="140" width="18" height="6" rx="2" fill="#d0d0d0"/>

        <!-- Base stand -->
        <rect x="55" y="158" width="50" height="8" rx="4" fill="#e0e0e0"/>
        <rect x="45" y="164" width="70" height="6" rx="3" fill="#d0d0d0"/>

        <!-- Broken cable / wire coming off -->
        <path d="M140 107 Q158 107 158 130 Q158 155 148 158" stroke="#d0d0d0" stroke-width="2.5" stroke-linecap="round" fill="none" stroke-dasharray="5 4"/>
        <!-- disconnect spark -->
        <circle cx="148" cy="160" r="3" fill="#e8281a" opacity=".7"/>
      </svg>
    </div>

    <div class="label">Error Terdeteksi</div>

    <h1>4<span>0</span>4</h1>
    <h2 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#0d0d0d;margin-bottom:12px;letter-spacing:-0.01em;">Server Down</h2>

    <p class="subtitle">
      Server tidak dapat dihubungi saat ini. Kami sedang bekerja keras untuk memulihkannya. Silakan coba lagi nanti.
    </p>

    <div class="actions">
      <a href="https://www.google.com" class="btn btn-primary">
        <!-- Home icon -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
        Kembali ke Beranda
      </a>
      <a href="https://files.catbox.moe/lnjjyp.jpg" class="btn btn-secondary">
        <!-- Activity icon -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Bantuan Donasi
      </a>
    </div>

    <div class="status-bar">
      <span class="dot"></span>
      <span>Layanan tidak tersedia &nbsp;·&nbsp; Kode: HTTP 404</span>
    </div>

  </div>
</body>
  </html>
